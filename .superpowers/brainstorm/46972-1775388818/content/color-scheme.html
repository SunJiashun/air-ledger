<h2>配色方案选择</h2>

<div class="cards" style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;">

          <div style="flex:1;background:#E8DDD3;border-radius:8px;padding:10px;text-align:center;">
            <div style="font-size:10px;color:#8B7E72;">餐饮</div>
            <div style="font-size:14px;font-weight:600;color:#C4A882;">¥1,200</div>
          </div>
          <div style="flex:1;background:#D5CDC4;border-radius:8px;padding:10px;text-align:center;">
            <div style="font-size:10px;color:#8B7E72;">交通</div>
            <div style="font-size:14px;font-weight:600;color:#A0917E;">¥580</div>
          </div>
          <div style="flex:1;background:#C8D5D0;border-radius:8px;padding:10px;text-align:center;">
            <div style="font-size:10px;color:#7A8B84;">购物</div>
            <div style="font-size:14px;font-weight:600;color:#8BA89D;">¥900</div>
          </div>
        </div>
        <!-- Color palette -->
        <div style="display:flex;gap:6px;margin-top:16px;justify-content:center;">
          <div style="width:24px;height:24px;border-radius:50%;background:#C4A882;"></div>

          <div style="width:24px;height:24px;border-radius:50%;background:#8BA4B5;"></div>

      <p>柔和灰调，优雅温润。大量留白，护眼舒适。适合日常频繁使用。</p>
